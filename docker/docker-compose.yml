services:
  mysql:
    image: mysql:8.0.33
    container_name: be-b-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - be-b-mysql-data:/var/lib/mysql

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: be-b-app
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      MYSQL_DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      MYSQL_DB_USER_NAME: ${MYSQL_USER}
      MYSQL_DB_PASSWORD: ${MYSQL_PASSWORD}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      CREATOR_JWT_SECRET: ${CREATOR_JWT_SECRET}
      TZ: Asia/Seoul
    ports:
      - "${APP_PORT}:8080"

volumes:
  be-b-mysql-data:
